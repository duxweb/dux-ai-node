name: build-node

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxcb1-dev \
            libdbus-1-dev \
            libwayland-dev \
            libxrandr-dev \
            libpipewire-0.3-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: TARGET=${{ matrix.target }} ./scripts/build-linux.sh
      - uses: actions/upload-artifact@v6
        with:
          name: dux-ai-node-linux-${{ matrix.arch }}
          path: |
            dist/linux/${{ matrix.target }}
            dist/linux/dux-ai-node-${{ matrix.target }}.tar.gz
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/linux/dux-ai-node-${{ matrix.target }}.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/build-windows.ps1
        shell: pwsh
      - uses: actions/upload-artifact@v6
        with:
          name: dux-ai-node-windows-x86_64
          path: |
            dist/windows/x86_64-pc-windows-msvc
            dist/windows/dux-ai-node-x86_64-pc-windows-msvc.zip
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/dux-ai-node-x86_64-pc-windows-msvc.zip

  macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/build-macos-app.sh
      - uses: actions/upload-artifact@v6
        with:
          name: dux-ai-node-macos-x86_64
          path: |
            dist/Dux AI Node.app
            dist/Dux-AI-Node-macos-x86_64.zip
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Dux-AI-Node-macos-x86_64.zip

  macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/build-macos-app.sh
      - uses: actions/upload-artifact@v6
        with:
          name: dux-ai-node-macos-arm64
          path: |
            dist/Dux AI Node.app
            dist/Dux-AI-Node-macos-arm64.zip
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Dux-AI-Node-macos-arm64.zip
