<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Dux AI Node 权限</title>
  <style>{{ app_css|safe }}</style>
</head>
<body>
  <div class="window">
    <div class="section-label">权限说明</div>
    <div class="group">
      <div class="row">
        <span class="row-label">当前可执行文件</span>
        <span class="row-value" style="max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ exec_path }}</span>
      </div>
      <div class="row">
        <span class="row-label">说明</span>
        <span class="row-value" style="max-width:70%;white-space:normal;text-align:right">如果已授权但仍显示未授权，请刷新或者重启应用</span>
      </div>
    </div>

    <div class="actions">
      <a class="btn" href="dux://open-privacy-settings">隐私与安全性</a>
      <a class="btn" href="dux://copy-executable-path">复制路径</a>
      <a class="btn" href='dux://refresh-permissions'>刷新状态</a>
      <a class="btn btn-primary" href="dux://restart-app">重启应用</a>
    </div>

    <div class="section-label">权限列表</div>
    <div class="group">
      {% for item in permissions %}
      <div class="row perm-row">
        <div class="perm-info">
          <div class="perm-name">{{ item.summary }}</div>
          <div class="perm-desc">{{ item.detail }}</div>
        </div>
        <div class="perm-right">
          <span class="{{ item.badge_class }}">{{ item.badge_text }}</span>
          {% if item.action %}
          <a class="btn btn-sm" href='dux://{{ item.action }}'>设置</a>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
